name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Download Cairo fonts
        run: |
          mkdir -p assets/fonts
          curl -L -o assets/fonts/Cairo-Regular.ttf https://github.com/google/fonts/raw/main/ofl/cairo/Cairo-Regular.ttf
          curl -L -o assets/fonts/Cairo-Bold.ttf https://github.com/google/fonts/raw/main/ofl/cairo/Cairo-Bold.ttf
          curl -L -o assets/fonts/Cairo-SemiBold.ttf https://github.com/google/fonts/raw/main/ofl/cairo/Cairo-SemiBold.ttf
          ls -lh assets/fonts/

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK release
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DebtTrackerPro-v2-APK
          path: build/app/outputs/flutter-apk/app-release.apk