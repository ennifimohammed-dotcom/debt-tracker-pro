name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Download Cairo fonts
        run: |
          mkdir -p assets/fonts
          curl -fsSL "https://github.com/google/fonts/raw/refs/heads/main/ofl/cairo/static/Cairo-Regular.ttf" \
            -o assets/fonts/Cairo-Regular.ttf || \
          curl -fsSL "https://fonts.gstatic.com/s/cairo/v28/SLXgc1nY6HkvalIhTp2mxdt0UX8.woff2" \
            -o assets/fonts/Cairo-Regular.ttf || true
          cp assets/fonts/Cairo-Regular.ttf assets/fonts/Cairo-Bold.ttf 2>/dev/null || true
          cp assets/fonts/Cairo-Regular.ttf assets/fonts/Cairo-SemiBold.ttf 2>/dev/null || true
          ls -lh assets/fonts/

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK release
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DebtTrackerPro-v2-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "✅ Build successful!"
          ls -lh build/app/outputs/flutter-apk/app-release.apk